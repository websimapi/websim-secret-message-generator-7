<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Message Generator</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <div id="app">
        <div id="frames-container">
            <h3>Message Frames</h3>
            <div id="frames-list">
                <!-- JS will populate this -->
            </div>
            <button id="add-frame-btn">+ Add Frame</button>
        </div>

        <div id="settings-container">
            <h3>Anaglyph Settings</h3>
            <div class="settings-grid">
                <fieldset>
                    <legend>Scrambled Layer</legend>
                    <div class="setting-item">
                        <label for="scrambled-color">Color</label>
                        <input type="color" id="scrambled-color" value="#ff0000">
                    </div>
                    <div class="setting-item">
                        <label for="scrambled-blend-mode">Blend Mode</label>
                        <select id="scrambled-blend-mode"></select>
                    </div>
                </fieldset>
                
                <fieldset>
                    <legend>Hidden Layer</legend>
                    <div class="setting-item">
                        <label for="hidden-color">Color</label>
                        <input type="color" id="hidden-color" value="#00ffff">
                    </div>
                    <div class="setting-item">
                        <label for="hidden-blend-mode">Blend Mode</label>
                        <select id="hidden-blend-mode"></select>
                    </div>
                    <div class="setting-item range-item">
                        <label for="hidden-offset-x">Offset X: <span id="hidden-offset-x-value">0</span>px</label>
                        <input type="range" id="hidden-offset-x" min="-10" max="10" value="0" step="1">
                    </div>
                     <div class="setting-item range-item">
                        <label for="hidden-offset-y">Offset Y: <span id="hidden-offset-y-value">0</span>px</label>
                        <input type="range" id="hidden-offset-y" min="-10" max="10" value="0" step="1">
                    </div>
                </fieldset>

                <fieldset class="fieldset-span-2">
                    <legend>General Text</legend>
                    <div class="setting-item">
                        <label for="font-family">Font Family</label>
                        <select id="font-family"></select>
                    </div>
                    <div class="setting-item">
                        <label for="custom-font-input">Upload Custom Font</label>
                        <input type="file" id="custom-font-input" accept=".ttf,.otf,.woff,.woff2" class="font-upload-input">
                    </div>
                    <div class="setting-item range-item">
                        <label for="font-size">Font Size: <span id="font-size-value">24</span>px</label>
                        <input type="range" id="font-size" min="8" max="72" value="24" step="1">
                    </div>
                    <div class="setting-item range-item">
                        <label for="font-weight">Font Weight: <span id="font-weight-value">700</span></label>
                        <input type="range" id="font-weight" min="100" max="900" value="700" step="100">
                    </div>
                    <div class="setting-item range-item">
                        <label for="letter-spacing">Letter Spacing: <span id="letter-spacing-value">2</span>px</label>
                        <input type="range" id="letter-spacing" min="-5" max="20" value="2" step="1">
                    </div>
                    <div class="setting-item range-item">
                        <label for="line-height">Line Height: <span id="line-height-value">1.2</span></label>
                        <input type="range" id="line-height" min="0.5" max="3" value="1.2" step="0.1">
                    </div>
                </fieldset>
                
                <fieldset class="fieldset-span-2">
                    <legend>Background</legend>
                    <div class="setting-item">
                        <label for="bg-color">Color</label>
                        <input type="color" id="bg-color" value="#ffffff">
                    </div>
                     <div class="setting-item range-item">
                        <label for="noise-opacity">Noise Opacity: <span id="noise-opacity-value">1.0</span></label>
                        <input type="range" id="noise-opacity" min="0" max="1" value="1" step="0.05">
                    </div>
                    <div class="setting-item">
                        <label for="noise-type">Noise Type</label>
                        <select id="noise-type">
                            <option value="color" selected>Color</option>
                            <option value="grayscale">Grayscale</option>
                        </select>
                    </div>
                    <div class="setting-item range-item">
                        <label for="noise-scale">Noise Scale: <span id="noise-scale-value">1</span>px</label>
                        <input type="range" id="noise-scale" min="1" max="10" value="1" step="1">
                    </div>
                </fieldset>
                
                <fieldset class="fieldset-span-2">
                    <legend>GIF</legend>
                    <div class="setting-item range-item">
                        <label for="gif-fps">Animation FPS: <span id="gif-fps-value">5</span></label>
                        <input type="range" id="gif-fps" min="1" max="30" value="5" step="1">
                    </div>
                    <div class="setting-item range-item">
                        <label for="dialogue-fps">Dialogue Typing Speed (chars/sec): <span id="dialogue-fps-value">15</span></label>
                        <input type="range" id="dialogue-fps" min="1" max="50" value="15" step="1">
                    </div>
                    <div class="gif-controls">
                        <button id="play-pause-animation" title="Preview animation">Play</button>
                        <button id="generate-gif-btn" title="Generate and download a GIF of the animation">Generate & Download GIF</button>
                        <span id="gif-status"></span>
                    </div>
                </fieldset>

                <fieldset class="fieldset-span-2">
                    <legend>AI Scene Generation</legend>
                    <div class="setting-item" style="flex-direction: column; align-items: stretch; grid-column: span 2;">
                        <label for="ai-prompt">Describe the scene to hide your message in:</label>
                        <textarea id="ai-prompt" rows="3" placeholder="e.g., A dense jungle, a futuristic cityscape at night, an abstract painting..."></textarea>
                    </div>
                    <div class="setting-item range-item" style="grid-column: span 2;">
                        <label for="ai-preserve-percentage">Text Preservation Strength: <span id="ai-preserve-percentage-value">100</span>%</label>
                        <input type="range" id="ai-preserve-percentage" min="50" max="100" value="100" step="1" title="Controls how strictly the AI must preserve the original text art. 100% is exact preservation. Lower values allow for stylistic changes.">
                    </div>
                    <div class="ai-controls">
                        <button id="generate-ai-scene-btn">Generate Scene from Current Frame</button>
                        <span id="ai-status"></span>
                    </div>
                    <div id="ai-result-container" style="display: none;">
                        <img id="ai-result-img" src="" alt="AI Generated Scene">
                        <button id="apply-ai-scene-btn">Apply as Background</button>
                    </div>
                </fieldset>
            </div>
        </div>

        <div id="output-container">
            <canvas id="noise-canvas"></canvas>
            <div id="output-scrambled" class="output-text"></div>
            <div id="output-hidden" class="output-text"></div>
        </div>
    </div>
    <script src="noise-generator.js" type="module"></script>
    <script src="text-scrambler.js" type="module"></script>
    <script src="canvas-renderer.js" type="module"></script>
    <script src="frame-manager.js" type="module"></script>
    <script src="animation-controller.js" type="module"></script>
    <script src="gif-generator.js" type="module"></script>
    <script src="ai-generator.js" type="module"></script>
    <script src="ui-controller.js" type="module"></script>
    <script src="main.js" type="module"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
